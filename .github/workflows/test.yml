name: CI

on:
    push:
    pull_request:
    workflow_dispatch:

env:
    FOUNDRY_PROFILE: ci

jobs:
    check:
        strategy:
            fail-fast: true

        name: Curvy Protocol's EVM contracts (CI)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1

            - name: Show Forge version
              run: |
                  forge --version

            - name: Run Forge fmt
              run: |
                  forge fmt --check
              id: fmt

            - name: Run Forge build
              run: |
                  forge build --sizes
              id: build

            - name: Run Forge tests
              run: |
                  mv test/csuc/upgrades/CSUC_Upgrade.t.sol test/csuc/upgrades/CSUC_Upgrade.t.txt && forge test -vvv
              id: test
